<div class="card">
    <h2>API Key 設置 API Key Settings</h2>
    <div class="toolbar">
        <button onclick="showModal('addKeyModal')">新增 Key Add Key</button>
        <button onclick="showModal('batchTestServerModal')" class="purple">批量測試 Batch Test</button>
        <span style="font-size:13px;color:#7f8c8d">API Key 以明文存入配置文件，請妥善保管</span>
    </div>
</div>
<div class="card">
    <table><thead><tr>
        <th>服務器 Server</th><th>API Key</th><th>模式 Mode</th><th>狀態 Status</th><th>權重 Weight</th><th>上次測試 Last Check</th><th>備註 Notes</th><th>操作 Actions</th>
    </tr></thead>
    <tbody id="keysTable"></tbody></table>
</div>
<div class="modal" id="addKeyModal">
    <div class="modal-content">
        <div class="modal-header"><h3>新增 API Key</h3><button class="close" onclick="hideModal('addKeyModal')">&times;</button></div>
        <div class="form-group"><label>服務器 Server</label><select id="keyServer"></select></div>
        <div class="form-group"><label>API Key</label><input type="text" id="keyValue" placeholder="sk-..."></div>
        <div class="form-group"><label>備註 Notes</label><input type="text" id="keyNotes" placeholder="optional"></div>
        <div class="form-group"><label>模式 Mode</label>
            <select id="keyStatus"><option value="enabled">開啟 Enabled</option><option value="disabled">關閉 Disabled</option><option value="auto">自動 Auto</option></select>
        </div>
        <button onclick="addKey()">新增 Add</button>
        <button onclick="hideModal('addKeyModal')" style="background:#95a5a6;margin-left:8px">取消 Cancel</button>
    </div>
</div>
<div class="modal" id="editKeyModal">
    <div class="modal-content">
        <div class="modal-header"><h3>編輯 API Key</h3><button class="close" onclick="hideModal('editKeyModal')">&times;</button></div>
        <input type="hidden" id="editKeyId">
        <div class="form-group"><label>API Key (不可修改)</label><input type="text" id="editKeyValue" disabled></div>
        <div class="form-group"><label>備註 Notes</label><input type="text" id="editKeyNotes"></div>
        <div class="form-group"><label>模式 Mode</label>
            <select id="editKeyStatus"><option value="enabled">開啟 Enabled</option><option value="disabled">關閉 Disabled</option><option value="auto">自動 Auto</option></select>
        </div>
        <button onclick="updateKey()">儲存 Save</button>
        <button onclick="hideModal('editKeyModal')" style="background:#95a5a6;margin-left:8px">取消 Cancel</button>
    </div>
</div>
<div class="modal" id="batchTestServerModal">
    <div class="modal-content">
        <div class="modal-header"><h3>批量測試 Batch Test</h3><button class="close" onclick="hideModal('batchTestServerModal')">&times;</button></div>
        <div class="form-group"><label>服務器 Server</label><select id="batchTestServer" onchange="loadBatchTestModels()"></select></div>
        <div class="form-group"><label>模型 Model</label><select id="batchTestModel"><option value="">自動選取 (第一個模型)</option></select></div>
        <button onclick="startBatchTest()" id="batchTestBtn">開始測試 Start Test</button>
        <div id="batchTestProgress" style="margin-top:10px;font-size:13px"></div>
    </div>
</div>
<script>
function keyStatusHtml(k){
    if(k.status=='disabled')return '<span class="led led-gray"></span>關閉';
    if(k.status=='enabled')return '<span class="led led-blue"></span>正常';
    if(k.status=='auto'){
        if(!k.last_check_time || k.last_check_result==''||k.last_check_result=='not tested')return '<span class="led led-gray"></span>未測試';
        if(k.last_check_result=='ok'||k.last_check_result=='success')return '<span class="led led-blue"></span>正常';
        return '<span class="led led-red"></span>失敗';
    }
    return '<span class="led led-gray"></span>未知';
}
var keyServerNameMap = {};
var keyServerModelsMap = {};
function loadAllData(){fetch('/api/servers').then(r=>r.json()).then(function(d){
    keyServerModelsMap = {};
    d.servers.forEach(function(s){keyServerNameMap[s.id]=s.name;keyServerModelsMap[s.id]=[]});
    var opts=d.servers.map(function(s){return '<option value="'+s.id+'">'+escapeHtml(s.name)+'</option>'}).join('');
    document.getElementById('keyServer').innerHTML=opts;
    document.getElementById('batchTestServer').innerHTML=opts;
    return fetch('/api/server-models').then(function(r){return r.json()}).then(function(md){
        md.server_models.forEach(function(m){
            if(keyServerModelsMap[m.server_id]) keyServerModelsMap[m.server_id].push(m);
        });
        loadKeys();
    });
})}
function loadBatchTestModels(){
    var sid=document.getElementById('batchTestServer').value;
    var sel=document.getElementById('batchTestModel');
    var models=keyServerModelsMap[sid]||[];
    sel.innerHTML='<option value="">自動選取 (第一個模型)</option>'+models.map(function(m){return '<option value="'+m.model_id+'">'+escapeHtml(m.model_name)+' ('+escapeHtml(m.model_id)+')</option>'}).join('');
}
function loadKeys(){fetch('/api/server-api-keys').then(r=>r.json()).then(function(d){
    var rows='';
    d.server_api_keys.forEach(function(k){
        var svName=keyServerNameMap[k.server_id]||k.server_id;
        rows+='<tr data-id="'+escapeHtml(k.id)+'"><td>'+escapeHtml(svName)+'</td><td>'+escapeHtml(k.api_key)+'</td><td>'+modeText(k.status)+'</td><td>'+keyStatusHtml(k)+'</td><td>'+k.negative_weight+'</td><td>'+(k.last_check_time?new Date(k.last_check_time).toLocaleString():"-")+'</td><td>'+escapeHtml(k.notes||'')+'</td><td class=actions><button class="small" onclick="editKey(\''+k.id+'\',\''+escapeHtml(k.api_key).replace(/'/g,"\\'")+'\',\''+escapeHtml(k.notes||'').replace(/'/g,"\\'")+'\',\''+k.status+'\')">編輯 Edit</button><button class="small success" onclick="testSingleKey(\''+k.id+'\')">測試 Test</button><button class="small danger" onclick="deleteKey(\''+k.id+'\')">刪除 Delete</button></td></tr>'
    });
    document.getElementById('keysTable').innerHTML=rows;
})}
function addKey(){fetch('/api/server-api-keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({server_id:document.getElementById('keyServer').value,api_key:document.getElementById('keyValue').value,status:document.getElementById('keyStatus').value,notes:document.getElementById('keyNotes').value})}).then(r=>r.json()).then(function(d){if(d.status=='ok'){hideModal('addKeyModal');loadKeys()}else alert('Error: '+d.error)})}
function editKey(id,key,notes,status){document.getElementById('editKeyId').value=id;document.getElementById('editKeyValue').value=key;document.getElementById('editKeyNotes').value=notes;document.getElementById('editKeyStatus').value=status;showModal('editKeyModal')}
function updateKey(){fetch('/api/server-api-keys',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:document.getElementById('editKeyId').value,notes:document.getElementById('editKeyNotes').value,status:document.getElementById('editKeyStatus').value})}).then(r=>r.json()).then(function(d){if(d.status=='ok'){hideModal('editKeyModal');loadKeys()}else alert('Error: '+d.error)})}
function deleteKey(id){if(!confirm('確定刪除? Delete?'))return;fetch('/api/server-api-keys/'+id,{method:'DELETE'}).then(r=>r.json()).then(function(d){if(d.status=='ok')loadKeys();else alert('Error: '+d.error)})}
function testSingleKey(keyId){fetch('/api/test-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key_id:keyId})}).then(function(r){return r.json()}).then(function(d){alert('Status: '+d.status+'\nDuration: '+d.duration+(d.error?'\nError: '+d.error:''));loadKeys()})}
function startBatchTest(){var sid=document.getElementById('batchTestServer').value;var mid=document.getElementById('batchTestModel').value;var btn=document.getElementById('batchTestBtn');var progress=document.getElementById('batchTestProgress');btn.disabled=true;progress.innerHTML='測試中... Testing...';fetch('/api/test-key?server_id='+sid+(mid?'&model_id='+mid:'')).then(r=>r.json()).then(function(d){progress.innerHTML='完成! Completed! ('+d.results.length+' keys)';btn.disabled=false;loadKeys()}).catch(function(e){progress.innerHTML='錯誤 Error: '+e;btn.disabled=false})}
loadAllData();
</script>
