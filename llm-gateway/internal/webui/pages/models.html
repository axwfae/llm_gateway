<div class="card">
    <h2>模型設置 Model Settings</h2>
    <button onclick="showModal('addModelModal')">新增模型 Add Model</button>
</div>
<div class="card">
    <table><thead><tr>
        <th>服務器 Server</th><th>模型 ID</th><th>名稱 Name</th><th>操作 Actions</th>
    </tr></thead>
    <tbody id="modelsTable"></tbody></table>
</div>
<div class="modal" id="addModelModal">
    <div class="modal-content">
        <div class="modal-header"><h3>新增模型 Add Model</h3><button class="close" onclick="hideModal('addModelModal')">&times;</button></div>
        <div class="form-group"><label>服務器 Server</label><select id="modelServer"></select></div>
        <div class="form-group"><label>模型 ID (上游) Model ID</label><input type="text" id="modelID" placeholder="e.g. gpt-4-turbo"></div>
        <div class="form-group"><label>模型名稱 Model Name</label><input type="text" id="modelName" placeholder="e.g. GPT-4"></div>
        <button onclick="addModel()">新增 Add</button>
        <button onclick="hideModal('addModelModal')" style="background:#95a5a6;margin-left:8px">取消 Cancel</button>
    </div>
</div>
<div class="modal" id="editModelModal">
    <div class="modal-content">
        <div class="modal-header"><h3>編輯模型 Edit Model</h3><button class="close" onclick="hideModal('editModelModal')">&times;</button></div>
        <input type="hidden" id="editModelId">
        <div class="form-group"><label>服務器 Server</label><select id="editModelServer"></select></div>
        <div class="form-group"><label>模型 ID (上游) Model ID</label><input type="text" id="editModelID"></div>
        <div class="form-group"><label>模型名稱 Model Name</label><input type="text" id="editModelName"></div>
        <button onclick="updateModel()">儲存 Save</button>
        <button onclick="hideModal('editModelModal')" style="background:#95a5a6;margin-left:8px">取消 Cancel</button>
    </div>
</div>
<script>
var serverNameMap = {};
function loadServersForSelect(){fetch('/api/servers').then(r=>r.json()).then(function(d){
    var opts=d.servers.map(function(s){serverNameMap[s.id]=s.name;return '<option value="'+s.id+'">'+escapeHtml(s.name)+'</option>'}).join('');
    document.getElementById('modelServer').innerHTML=opts;
    document.getElementById('editModelServer').innerHTML=opts;
    loadModels();
})}
function loadModels(){fetch('/api/server-models').then(r=>r.json()).then(function(d){
    document.getElementById('modelsTable').innerHTML=d.server_models.map(function(m){
        var svName=serverNameMap[m.server_id]||m.server_id;
        return '<tr><td>'+escapeHtml(svName)+'</td><td>'+escapeHtml(m.model_id)+'</td><td>'+escapeHtml(m.model_name)+'</td><td class=actions><button class=small onclick="editModel(\''+m.id+'\',\''+escapeHtml(m.model_name).replace(/'/g,"\\'")+'\',\''+escapeHtml(m.model_id).replace(/'/g,"\\'")+'\',\''+m.server_id+'\')">編輯 Edit</button><button class="small danger" onclick="deleteModel(\''+m.id+'\')">刪除 Delete</button></td></tr>'
    }).join('')
})}
function addModel(){fetch('/api/server-models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_name:document.getElementById('modelName').value,model_id:document.getElementById('modelID').value,server_id:document.getElementById('modelServer').value})}).then(r=>r.json()).then(function(d){if(d.status=='ok'){hideModal('addModelModal');loadServersForSelect()}else alert('Error: '+d.error)})}
function editModel(id,name,mid,sid){document.getElementById('editModelId').value=id;document.getElementById('editModelName').value=name;document.getElementById('editModelID').value=mid;document.getElementById('editModelServer').value=sid;showModal('editModelModal')}
function updateModel(){fetch('/api/server-models',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:document.getElementById('editModelId').value,model_name:document.getElementById('editModelName').value,model_id:document.getElementById('editModelID').value,server_id:document.getElementById('editModelServer').value})}).then(r=>r.json()).then(function(d){if(d.status=='ok'){hideModal('editModelModal');loadServersForSelect()}else alert('Error: '+d.error)})}
function deleteModel(id){if(!confirm('確定刪除? Delete?'))return;fetch('/api/server-models/'+id,{method:'DELETE'}).then(r=>r.json()).then(function(d){if(d.status=='ok')loadServersForSelect();else alert('Error: '+d.error)})}
loadServersForSelect();
</script>
