<div class="card">
    <h2>系統設置 System Settings</h2>

    <div class="form-group"><label>超時分鐘 Timeout (min)</label><input type="number" id="timeout" min="1" max="60"></div>
    <hr>

    <div class="form-group checkbox"><label><input type="checkbox" id="enableRetry"> 啟用重試 Enable Retry</label></div>
    <p class="help-text" style="margin:-10px 0 15px 24px">啟用後，請求失敗時會自動更換 API Key 重新發送，直到達到最大重試次數</p>
    <div class="form-group"><label>最大重試次數 Max Retries</label><input type="number" id="maxRetries" min="0" max="10"></div>
    <hr>

    <div class="form-group checkbox"><label><input type="checkbox" id="enableNegativeWeight"> 啟用負權重模式 Enable Negative Weight</label></div>
    <p class="help-text" style="margin:-10px 0 15px 24px">啟用後改為「負權重」模式（依權重選最低的 Key 並黏著使用）；關閉則使用「輪詢」模式（依序輪換 Key）</p>
    <div class="form-row">
        <div class="form-group"><label>權重重置時數 Weight Reset (hrs)</label><input type="number" id="weightResetHours" min="1" max="72"></div>
        <div class="form-group"><label>連接超時 Connect Timeout (s)</label><input type="number" id="connectTimeout" min="1" max="120"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>4xx 權重 Weight 4xx</label><input type="number" id="weight4xx" min="0" max="100"></div>
        <div class="form-group"><label>5xx 權重 Weight 5xx</label><input type="number" id="weight5xx" min="0" max="100"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>超時權重 Timeout Weight</label><input type="number" id="timeoutWeight" min="0" max="100"></div>
        <div class="form-group"><label>連接超時權重 Connect Timeout Weight</label><input type="number" id="connectTimeoutWeight" min="0" max="100"></div>
    </div>
    <hr>

    <div class="form-group checkbox"><label><input type="checkbox" id="enableAutoCheck"> 自動檢查 API Key Auto Check</label></div>
    <p class="help-text" style="margin:-10px 0 15px 24px">啟用後會定期對模式為「自動」的 Key 發送測試請求，失敗的 Key 自動退出輪換池</p>
    <div class="form-group"><label>自動檢查間隔 Auto Check Interval (hrs)</label><input type="number" id="autoCheckInterval" min="1" max="12"></div>

    <hr>
    <button onclick="saveSettings()">儲存設置 Save Settings</button>
    <button onclick="loadSettings()" style="background:#95a5a6;margin-left:8px">重新載入 Reload</button>
    <button onclick="reloadConfig()" class="warning" style="margin-left:8px">重新加載配置 Reload Config</button>
    <button onclick="resetWeights()" class="danger" style="margin-left:8px">重置所有權重 Reset Weights</button>
    <div id="settingsResult" class="inline-result" style="display:none"></div>
</div>
<script>
function loadSettings(){fetch('/api/settings').then(r=>r.json()).then(function(d){
    document.getElementById('timeout').value=d.timeout;
    document.getElementById('enableRetry').checked=d.enable_retry;
    document.getElementById('maxRetries').value=d.max_retries;
    document.getElementById('enableNegativeWeight').checked=d.enable_negative_weight;
    document.getElementById('weightResetHours').value=d.weight_reset_hours;
    document.getElementById('connectTimeout').value=d.connect_timeout;
    document.getElementById('weight4xx').value=d.weight_4xx;
    document.getElementById('weight5xx').value=d.weight_5xx;
    document.getElementById('timeoutWeight').value=d.timeout_weight;
    document.getElementById('connectTimeoutWeight').value=d.connect_timeout_weight;
    document.getElementById('enableAutoCheck').checked=d.enable_auto_check_api_key;
    document.getElementById('autoCheckInterval').value=d.auto_check_interval_hours;
})}
function saveSettings(){fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    timeout:parseInt(document.getElementById('timeout').value)||5,
    enable_retry:document.getElementById('enableRetry').checked,
    max_retries:parseInt(document.getElementById('maxRetries').value)||3,
    enable_negative_weight:document.getElementById('enableNegativeWeight').checked,
    weight_reset_hours:parseInt(document.getElementById('weightResetHours').value)||4,
    connect_timeout:parseInt(document.getElementById('connectTimeout').value)||30,
    weight_4xx:parseInt(document.getElementById('weight4xx').value)||5,
    weight_5xx:parseInt(document.getElementById('weight5xx').value)||10,
    timeout_weight:parseInt(document.getElementById('timeoutWeight').value)||8,
    connect_timeout_weight:parseInt(document.getElementById('connectTimeoutWeight').value)||12,
    enable_auto_check_api_key:document.getElementById('enableAutoCheck').checked,
    auto_check_interval_hours:parseInt(document.getElementById('autoCheckInterval').value)||6
})}).then(r=>r.json()).then(function(d){
    var el=document.getElementById('settingsResult');el.style.display='block';
    if(d.status=='ok'){el.className='inline-result ok';el.textContent='儲存成功 Saved'}else{el.className='inline-result fail';el.textContent='Error: '+d.error}
})}
function reloadConfig(){fetch('/api/reload',{method:'POST'}).then(r=>r.json()).then(d=>{
    var el=document.getElementById('settingsResult');el.style.display='block';
    if(d.status=='ok'){el.className='inline-result ok';el.textContent='配置已重新加載 Config Reloaded';loadSettings()}else{el.className='inline-result fail';el.textContent='Error: '+d.error}
})}
function resetWeights(){if(!confirm('確定重置所有權重? Reset all weights?'))return;fetch('/api/reset-weights',{method:'POST'}).then(r=>r.json()).then(d=>{
    var el=document.getElementById('settingsResult');el.style.display='block';
    if(d.status=='ok'){el.className='inline-result ok';el.textContent='權重已重置 Weights Reset'}else{el.className='inline-result fail';el.textContent='Error: '+d.error}
})}
loadSettings();
</script>
