<div class="card">
    <h2>測試結果 Test Results</h2>
    <button onclick="loadTestResults()">刷新 Refresh</button>
</div>
<div class="card">
    <table><thead><tr>
        <th>API Key</th><th>狀態 Status</th><th>耗時 Duration</th><th>錯誤 Error</th>
    </tr></thead>
    <tbody id="resultsTable"></tbody></table>
</div>
<script>
function loadTestResults(){fetch('/api/test-results').then(r=>r.json()).then(function(d){
    var rows='';
    (d.results||[]).forEach(function(r){
        rows+='<tr><td>'+(r.key_masked||'-')+'</td><td>'+ledHtml(r.status)+statusText(r.status)+'</td><td>'+escapeHtml(r.duration)+'</td><td>'+escapeHtml(r.error||'')+'</td></tr>'
    });
    document.getElementById('resultsTable').innerHTML=rows||'<tr><td colspan=4 style="text-align:center;color:#7f8c8d">暫無測試結果</td></tr>'
})}
loadTestResults();
</script>
